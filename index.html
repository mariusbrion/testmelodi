<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Naissances et décès par département</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: auto;
      padding: 30px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: end;
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      margin-top: 5px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
    }

    canvas {
      max-height: 420px;
    }

    #status {
      font-weight: bold;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <h1>Comparatif naissances / décès</h1>
  <p>Données INSEE Melodi par département.</p>

  <div class="controls">
    <label>
      Département
      <input id="departement" value="86" />
    </label>

    <label>
      Année min
      <input id="anneeMin" type="number" value="1975" />
    </label>

    <label>
      Année max
      <input id="anneeMax" type="number" value="2024" />
    </label>

    <button onclick="chargerDonnees()">Générer</button>
  </div>

  <div id="status"></div>

  <div class="card">
    <h2>Naissances et décès</h2>
    <canvas id="chartComparatif"></canvas>
  </div>

  <div class="card">
    <h2>Solde naturel</h2>
    <canvas id="chartSolde"></canvas>
  </div>

  <script>
    let chartComparatif = null;
    let chartSolde = null;

    async function fetchMelodi(url, nomColonne) {
      const response = await fetch(url, {
        headers: { "Accept": "application/json" }
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text);
      }

      const data = await response.json();
      const observations = data.observations || [];

      return observations.map(obs => {
        const dimensions = obs.dimensions || {};
        const valeur = obs.measures?.OBS_VALUE_NIVEAU?.value ?? null;

        return {
          ...dimensions,
          [nomColonne]: Number(valeur)
        };
      });
    }

    async function chargerDonnees() {
      const departement = document.getElementById("departement").value.trim();
      const anneeMin = Number(document.getElementById("anneeMin").value);
      const anneeMax = Number(document.getElementById("anneeMax").value);

      const status = document.getElementById("status");
      status.textContent = "Chargement des données INSEE...";

      try {
        const urlDeces =
          `https://api.insee.fr/melodi/data/DS_DECES_MORTALITE_SERIES` +
          `?GEO=2025-DEP-${departement}` +
          `&EC_MEASURE=DTH_PLACE_RES` +
          `&SEASONAL_ADJUST=N` +
          `&SEX=_T` +
          `&FREQ=A` +
          `&UNIT_MEASURE=NR` +
          `&AGE=_T`;

        const urlNaissances =
          `https://api.insee.fr/melodi/data/DS_EC_NAIS` +
          `?GEO=2025-DEP-${departement}` +
          `&EC_MEASURE=LVB` +
          `&FREQ=M`;

        const deces = await fetchMelodi(urlDeces, "DECES");
        const naissancesMensuelles = await fetchMelodi(urlNaissances, "NAISSANCES");

        const decesAnnuel = deces.map(d => ({
          annee: Number(d.TIME_PERIOD),
          deces: d.DECES
        }));

        const naissancesParAnnee = {};

        naissancesMensuelles.forEach(n => {
          const annee = Number(String(n.TIME_PERIOD).slice(0, 4));

          if (!naissancesParAnnee[annee]) {
            naissancesParAnnee[annee] = 0;
          }

          naissancesParAnnee[annee] += n.NAISSANCES;
        });

        const naissancesAnnuel = Object.entries(naissancesParAnnee).map(([annee, total]) => ({
          annee: Number(annee),
          naissances: total
        }));

        const merged = decesAnnuel
          .map(d => {
            const naissance = naissancesAnnuel.find(n => n.annee === d.annee);

            if (!naissance) return null;

            return {
              annee: d.annee,
              deces: d.deces,
              naissances: naissance.naissances,
              solde: naissance.naissances - d.deces
            };
          })
          .filter(d =>
            d !== null &&
            d.annee >= anneeMin &&
            d.annee <= anneeMax
          )
          .sort((a, b) => a.annee - b.annee);

        if (merged.length === 0) {
          status.textContent = "Aucune donnée trouvée pour cette période.";
          return;
        }

        status.textContent = `${merged.length} années chargées pour le département ${departement}.`;

        afficherGraphiques(merged, departement);

      } catch (error) {
        console.error(error);
        status.textContent = "Erreur : " + error.message;
      }
    }

    function afficherGraphiques(data, departement) {
      const labels = data.map(d => d.annee);
      const naissances = data.map(d => d.naissances);
      const deces = data.map(d => d.deces);
      const solde = data.map(d => d.solde);

      if (chartComparatif) chartComparatif.destroy();
      if (chartSolde) chartSolde.destroy();

      chartComparatif = new Chart(
        document.getElementById("chartComparatif"),
        {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Naissances",
                data: naissances,
                borderWidth: 2,
                tension: 0.2
              },
              {
                label: "Décès",
                data: deces,
                borderWidth: 2,
                tension: 0.2
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              title: {
                display: true,
                text: `Naissances et décès - Département ${departement}`
              }
            }
          }
        }
      );

      chartSolde = new Chart(
        document.getElementById("chartSolde"),
        {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Solde naturel",
                data: solde,
                borderWidth: 1
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              title: {
                display: true,
                text: `Solde naturel - Département ${departement}`
              }
            }
          }
        }
      );
    }

    chargerDonnees();
  </script>
</body>
</html>
